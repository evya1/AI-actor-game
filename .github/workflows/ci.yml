name: CI

# Adapted from ai-orchestration-ex4-finding-bugs ci.yml.
#
# Two layers:
#   1. Keyless gates — run on every push/PR with no secrets and NO submodule:
#      ruff, 150-line rule, repository validation, markdown links.
#   2. Test suite — tests import game.state from the private SSH submodule
#      (agent-orchestration-course-t6-common), so pytest can only run when the
#      repo secret SUBMODULE_SSH_KEY holds a read-only deploy key for that
#      repo. Without the secret, the test steps are skipped (not failed) and
#      the keyless gates still protect the branch.
#
# To enable full CI: add a deploy key to AmitKuper/agent-orchestration-course-t6-common
# (read-only) and store the private key as the SUBMODULE_SSH_KEY repo secret here.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  verify:
    name: Keyless gates + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository (no submodule)
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check src tests scripts

      - name: Line cap (src+tests raw, scripts logical)
        run: |
          uv run python scripts/check_line_cap.py src tests --limit 150 --mode raw
          uv run python scripts/check_line_cap.py scripts --limit 150 --mode logical

      - name: Project invariants (personal paths, actor isolation, models)
        run: uv run python scripts/validate_repo.py

      - name: Secret scan
        run: uv run python scripts/check_no_secrets.py

      - name: Required docs present
        run: uv run python scripts/check_docs_present.py

      - name: Markdown link check
        run: uv run python scripts/check_markdown_links.py

      - name: No tracked archives
        run: uv run python scripts/check_source_archives.py

      - name: Unique task IDs
        run: uv run python scripts/check_planning_ids.py

      - name: Workflow permissions minimal
        run: uv run python scripts/check_workflow_permissions.py

      - name: Detect submodule deploy key
        id: key
        env:
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: |
          if [[ -n "${SUBMODULE_SSH_KEY}" ]]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUBMODULE_SSH_KEY not set — skipping pytest (tests require the private submodule)."
          fi

      - name: Init private submodule
        if: steps.key.outputs.have == 'true'
        env:
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${SUBMODULE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git submodule update --init

      - name: Tests with coverage gate
        if: steps.key.outputs.have == 'true'
        run: uv run pytest --cov=actor_brains --cov-report=term-missing --cov-fail-under=85

      - name: README generated facts sync
        if: steps.key.outputs.have == 'true'
        run: uv run python scripts/readme_sync.py check
